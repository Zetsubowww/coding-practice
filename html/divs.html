<!DOCTYPE html>

    <div class="install">
        <p class="install-music">
           Install Youtube Music

            <img class="pet-img" src="/css/images/div-practice/cat2.jpg">

        </div>

        <div class="pet-profile">
            <img class="pet-img" src="/css/images/div-practice/dog.jpg">
            <p class="name">Rex</p>
            <p class="friends">4 mutual friends</p>
            <button class="add-friend">Add Friend</button>
        </div>
    </div>
